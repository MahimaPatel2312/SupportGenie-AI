<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | SupportGenie AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="auth-body">

<div class="auth-container">

    <div class="auth-card">

        <h1>🤖 SupportGenie AI</h1>

        <h2>Welcome Back</h2>

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

        {% if message %}

        <p class="auth-message">

            {{ message }}

        </p>

        {% endif %}

        <p>

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>

    </div>

</div>

</body>

</html>
